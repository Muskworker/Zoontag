name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-macos-app:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build release package
        run: ./scripts/package_release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zoontag-macos-package
          path: |
            .build/release/Zoontag-macOS.zip
            .build/release/Zoontag-macOS.zip.sha256

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '$ { /^[[:space:]]*$/d }')
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            .build/release/Zoontag-macOS.zip
            .build/release/Zoontag-macOS.zip.sha256
